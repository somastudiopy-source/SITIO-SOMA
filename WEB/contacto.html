    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="theme-dark">
    <div class="bg">
      <div class="bg-orb orb-1"></div>
      <div class="bg-orb orb-2"></div>
      <div class="bg-orb orb-3"></div>
    </div>

    <header class="nav glass">
      <div class="nav-inner">
        <div class="brand">
          <a class="brand-link" href="index.html">
            <img
              class="brand-logo"
              id="brandLogo"
              src="assets/logo-soma-white.png"
              data-dark="assets/logo-soma-white.png"
              data-light="assets/logo-soma-dark.png"
              alt="SOMA."
            />
          </a>
        </div>

        <nav class="nav-links">
          <a href="servicios.html">Servicios</a>
          <a href="nosotros.html">Nosotros</a>
          <a href="contacto.html">Contacto</a>

        <div class="nav-actions">
          <button class="icon-btn" id="themeToggle" aria-label="Cambiar tema">

          </button>
          <a class="link-pill" href="https://panel-production-9d04.up.railway.app/login">Acceso</a>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="section">
        <div class="section-head">
          <h2>Contacto</h2>
          <p>Decinos qué necesitás y te armamos una propuesta.</p>
        </div>

        <div class="glass contact">
          <div>
            <div class="contact-line"><span>📍</span> Salta, Argentina</div>
            <div class="contact-line"><span>💬</span> WhatsApp: (agregar número)</div>
            <div class="contact-line"><span>✉️</span> Email: (agregar email)</div>
          </div>

          <div class="contact-actions">
            <button class="blob-btn" type="button" id="contactBtn">
              <span class="text">Escribirme</span>
              <span class="blob"></span>
              <span class="blob"></span>
              <span class="blob"></span>
              <span class="blob"></span>
            </button>
            <a class="secondary" href="login.html">Acceso clientes</a>
          </div>
        </div>
      </section>

      <footer class="footer">
        <div>© <span id="year"></span> SOMA.</div>
        <div class="footer-links">
          <a href="index.html">Inicio</a>
          <a href="servicios.html">Servicios</a>
          <a href="nosotros.html">Nosotros</a>
        </div>
      </footer>

    <script src="script.js"></script>
